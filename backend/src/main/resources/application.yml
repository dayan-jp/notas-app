server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:notas_db}
    username: ${DB_USER:notas_user}
    password: ${DB_PASSWORD:notas_pass}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

app:
  jwt:
    secret: ${JWT_SECRET:cambia-este-secreto-en-produccion-por-uno-largo-y-aleatorio}
    expiration-ms: 86400000
  seed:
    admin-username: ${ADMIN_USERNAME:admin}
    admin-password: ${ADMIN_PASSWORD:admin123}
